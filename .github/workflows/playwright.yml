name: Playwright Checks
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  stable-practice:
    name: Stable Practice Coverage
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    - name: Run stable Playwright suite
      # OrangeHRM is the primary showcase in the repository, but the public demo environment
      # is not reliable enough to be the blocking CI gate. Keep CI anchored to the stable
      # secondary practice coverage instead.
      run: npm run test:playground
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ failure() && !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14
        if-no-files-found: ignore
    - name: Upload Playwright test results
      uses: actions/upload-artifact@v4
      if: ${{ failure() && !cancelled() }}
      with:
        name: playwright-test-results
        path: test-results/
        retention-days: 14
        if-no-files-found: ignore
